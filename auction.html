<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auction Tracker | VFA eFootball</title>
    <link rel="stylesheet" href="assets/css/main.css">
    <style>
        .auction-container {
            display: block;
            margin-top: 30px;
        }

        .tab-container {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 20px;
            flex-wrap: wrap;
        }

        .tab-btn {
            padding: 10px 25px;
            background: var(--surface-card);
            border: 1px solid var(--border-color);
            color: var(--text-muted);
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }

            .tab-btn.active {
                background: var(--vpl-primary);
                color: white;
                border-color: var(--vpl-primary);
                box-shadow: 0 0 15px rgba(30, 144, 255, 0.3);
            }

        /* Search Bar Styling */
        .search-wrapper {
            margin-bottom: 20px;
            position: relative;
        }

        .search-input {
            width: 100%;
            padding: 12px 15px;
            background: var(--surface-hover);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: white;
            font-size: 0.9rem;
            outline: none;
            transition: border-color 0.3s;
        }

            .search-input:focus {
                border-color: var(--vpl-primary);
            }

        /* Category Header Row */
        .category-row {
            background: rgba(212, 175, 55, 0.1) !important;
            border-left: 4px solid var(--vcl-gold);
        }

        .category-row td {
            color: var(--vcl-gold) !important;
            font-weight: bold !important;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-size: 0.85rem !important;
            padding: 12px 20px !important;
        }

        /* Live Stats Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-bottom: 25px;
        }

        .stat-card {
            background: var(--surface-card);
            padding: 15px;
            border-radius: 12px;
            text-align: center;
            border: 1px solid var(--border-color);
        }

            .stat-card small {
                color: var(--text-muted);
                display: block;
                margin-bottom: 5px;
                font-size: 0.75rem;
            }

            .stat-card strong {
                font-size: 1.2rem;
                color: var(--vpl-primary);
            }

        /* Squad Tab Grid */
        .squad-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
        }

        .squad-card {
            background: var(--surface-card);
            border-radius: 12px;
            padding: 15px;
            border: 1px solid var(--border-color);
        }

        .squad-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 1px solid var(--border-color);
        }

            .squad-header img {
                width: 30px;
                height: 30px;
                object-fit: contain;
            }

        .squad-table {
            width: 100%;
            font-size: 0.85rem;
            border-collapse: collapse;
        }

            .squad-table td {
                padding: 6px 4px;
                border-bottom: 1px solid rgba(255,255,255,0.05);
            }

            .squad-table .sl {
                color: var(--text-muted);
                width: 25px;
            }

            .squad-table .pos {
                color: var(--vcl-gold);
                font-weight: bold;
                width: 40px;
            }

        .status-badge {
            padding: 4px 8px;
            border-radius: 4px;
            font-weight: bold;
            font-size: 0.7rem;
            text-transform: uppercase;
        }

        .SOLD {
            background: rgba(34, 197, 94, 0.2);
            color: #22c55e;
        }

        .UNSOLD {
            background: rgba(239, 68, 68, 0.2);
            color: #ef4444;
        }

        .team-logo-mini {
            width: 25px;
            height: 25px;
            border-radius: 50%;
            vertical-align: middle;
            object-fit: contain;
        }

        @media (max-width: 600px) {
            .tab-btn {
                padding: 8px 15px;
                font-size: 0.8rem;
            }
        }
    </style>
</head>
<body>

    <div id="main-header"></div>

    <main class="container">
        <header style="text-align: center; margin-top: 40px;">
            <h1 style="color: var(--vpl-primary);">Season 08 Auction Tracker</h1>
            <p style="color: var(--text-muted);">Live updates from the bidding floor.</p>
        </header>

        <div class="tab-container">
            <button id="tabPlayer" class="tab-btn active" onclick="switchTab('player')">Player Pool</button>
            <button id="tabTeam" class="tab-btn" onclick="switchTab('team')">Budget Standings</button>
            <button id="tabSquad" class="tab-btn" onclick="switchTab('squad')">Team Squads</button>
        </div>

        <div class="auction-container">
            <!-- Player Section -->
            <div id="playerSection" class="card" style="padding: 20px; display: block;">
                <div class="search-wrapper">
                    <input type="text" id="playerSearch" class="search-input" placeholder="Search for a player name..." onkeyup="filterPlayers()">
                </div>
                <h2 style="margin-bottom: 20px; font-size: 1.2rem; border-left: 4px solid var(--vpl-primary); padding-left: 10px;">Player Pool</h2>
                <div style="overflow-x: auto;">
                    <table id="playerTable" class="league-table">
                        <thead>
                            <tr>
                                <th style="width: 40px;">SL</th>
                                <th>Name</th>
                                <th>Pos</th>
                                <th>Base</th>
                                <th>Sold Price</th>
                                <th>Sold To</th>
                                <th>Status</th>
                            </tr>
                        </thead>
                        <tbody><tr><td colspan="7" style="text-align:center;">Loading Players...</td></tr></tbody>
                    </table>
                </div>
            </div>

            <!-- Team Standings Section -->
            <div id="teamSection" class="card" style="padding: 20px; display: none;">
                <div class="stats-grid">
                    <div class="stat-card">
                        <small>Total Players Sold</small>
                        <strong id="statSold">0</strong>
                    </div>
                    <div class="stat-card">
                        <small>Total Spend</small>
                        <strong id="statSpent">0 Cr</strong>
                    </div>
                </div>
                <h2 style="margin-bottom: 20px; font-size: 1.2rem; border-left: 4px solid var(--vcl-gold); padding-left: 10px;">Budget Standings</h2>
                <div style="overflow-x: auto;">
                    <table id="teamTable" class="league-table">
                        <thead>
                            <tr>
                                <th style="width: 40px;">Logo</th>
                                <th>Team</th>
                                <th>Count</th>
                                <th>Spent</th>
                                <th>Remaining</th>
                            </tr>
                        </thead>
                        <tbody><tr><td colspan="5" style="text-align:center;">Calculating Finances...</td></tr></tbody>
                    </table>
                </div>
            </div>

            <!-- Squads Section -->
            <div id="squadSection" style="display: none;">
                <div id="squadNav" class="tab-container" style="margin-bottom: 20px; justify-content: flex-start; overflow-x: auto; padding-bottom: 10px;">
                    <!-- Team selection buttons will be injected here -->
                </div>
                <div id="squadGrid" class="squad-grid" style="grid-template-columns: 1fr;">
                    <p style="text-align:center; color: var(--text-muted);">Syncing Squads...</p>
                </div>
            </div>
        </div>
    </main>

    <div id="main-footer"></div>

    <script src="assets/js/main.js"></script>
    <script>
        const playersCsvUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQk0BZJ-JAtl6uuA5tiM2UPRKJXJV7v2KVKi5w2bb6W60-X04HzqLC7ggDS12qkfV77sKqyuhU_rnYE/pub?gid=747271299&single=true&output=csv";
        const teamFundCsvUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQk0BZJ-JAtl6uuA5tiM2UPRKJXJV7v2KVKi5w2bb6W60-X04HzqLC7ggDS12qkfV77sKqyuhU_rnYE/pub?gid=1339379932&single=true&output=csv";

        function switchTab(tab) {
            const sections = { player: 'playerSection', team: 'teamSection', squad: 'squadSection' };
            const buttons = { player: 'tabPlayer', team: 'tabTeam', squad: 'tabSquad' };
            Object.keys(sections).forEach(key => {
                document.getElementById(sections[key]).style.display = key === tab ? 'block' : 'none';
                document.getElementById(buttons[key]).classList.toggle('active', key === tab);
            });
        }

        function filterPlayers() {
            const input = document.getElementById('playerSearch');
            const filter = input.value.toLowerCase();
            const table = document.getElementById('playerTable');
            const tr = table.getElementsByTagName('tr');
            for (let i = 1; i < tr.length; i++) {
                if (tr[i].classList.contains('category-row')) continue;
                const nameCol = tr[i].getElementsByTagName('td')[1];
                if (nameCol) {
                    const textValue = nameCol.textContent || nameCol.innerText;
                    tr[i].style.display = textValue.toLowerCase().indexOf(filter) > -1 ? "" : "none";
                }
            }
        }

        async function fetchData() {
            const cb = `&t=${new Date().getTime()}`;
            await fetchPlayerPool(playersCsvUrl + cb);
            await fetchTeamData(teamFundCsvUrl + cb);
        }

        async function fetchPlayerPool(url) {
            try {
                const res = await fetch(url);
                const csv = await res.text();
                const rows = csv.split(/\r?\n/).map(r => r.split(','));
                const tbody = document.querySelector('#playerTable tbody');
                tbody.innerHTML = "";

                for (let i = 1; i < rows.length; i++) {
                    const cols = rows[i];
                    if (cols.length < 2) continue;

                    // Category detection: if Column A has text and others are empty
                    if (cols[0] && !cols[1] && !cols[5]) {
                        const catTr = document.createElement('tr');
                        catTr.className = "category-row";
                        catTr.innerHTML = `<td colspan="7">${cols[0]}</td>`;
                        tbody.appendChild(catTr);
                        continue;
                    }

                    // Player row
                    const name = cols[1]?.trim();
                    if (!name || name === "Player Name") continue;

                    const tr = document.createElement('tr');
                    const status = cols[6]?.trim().toUpperCase() || "UNSOLD";
                    
                    tr.innerHTML = `
                        <td style="color:var(--text-muted);font-size:0.8rem;">${cols[0]}</td>
                        <td>${name}</td>
                        <td>${cols[2] || ''}</td>
                        <td>${cols[3] || ''}</td>
                        <td>${cols[4] || ''}</td>
                        <td>${cols[5] || ''}</td>
                        <td><span class="status-badge ${status}">${status}</span></td>
                    `;
                    tbody.appendChild(tr);
                }
                filterPlayers();
            } catch (e) { console.error(e); }
        }

        async function fetchTeamData(url) {
            try {
                const res = await fetch(url);
                const csv = await res.text();
                const rows = csv.split(/\r?\n/).map(r => r.split(','));
                
                const teams = [];
                // Process 4 team blocks horizontally (A:C, E:G, I:K, M:O)
                // Row sets start at Row 1 and Row 35
                const startRows = [0, 34, 68, 102, 136]; 
                const colOffsets = [0, 4, 8, 12, 16, 20];

                startRows.forEach(sRow => {
                    colOffsets.forEach(cOff => {
                        const teamName = rows[sRow]?.[cOff]?.trim();
                        if (!teamName || teamName === "" || teamName === "Player Name") return;

                        // Budget Data (Relative to start row)
                        // Row 28: Count, Row 29: Spent, Row 30: Remaining
                        const pCount = rows[sRow + 27]?.[cOff + 1]?.trim() || "0";
                        const pSpent = rows[sRow + 28]?.[cOff + 1]?.trim() || "0";
                        const pRem = rows[sRow + 29]?.[cOff + 1]?.trim() || "0";

                        // Squad Data (Starts at Row 3)
                        const players = [];
                        for (let r = sRow + 2; r < sRow + 27; r++) {
                            const pName = rows[r]?.[cOff]?.trim();
                            if (pName && pName !== "" && pName !== "Player Name") {
                                players.push({
                                    name: pName,
                                    price: rows[r]?.[cOff + 1]?.trim(),
                                    fund: rows[r]?.[cOff + 2]?.trim()
                                });
                            }
                        }

                        teams.push({ name: teamName, count: pCount, spent: pSpent, remaining: pRem, players });
                    });
                });

                renderBudgets(teams);
                renderSquads(teams);
            } catch (e) { console.error(e); }
        }

        const LOGO_MAP = {
            'beast era fc': 'beast-era.png',
            'scarlet shield xi': 'spartan-shield-fc.png',
            'beast era': 'beast-era.png',
            'scarlet shield': 'spartan-shield-fc.png',
            'chaos fc': 'chaos-fc.jpg',
            'destroyer fc': 'destroyers-fc.jpg',
            'destroyers fc': 'destroyers-fc.jpg',
            'dream fail team': 'dream-fail-team.jpg',
            'midnight archon': 'midknight-archon.jpg',
            'midknight archon': 'midknight-archon.jpg',
            'mystic spyder': 'mystic-spyder.jpg'
        };

        function getTeamLogo(teamName) {
            const normalized = teamName.toLowerCase().trim();
            if (LOGO_MAP[normalized]) return `assets/images/logos/${LOGO_MAP[normalized]}`;
            
            const slug = normalized.replace(/\s+/g, '-');
            return `assets/images/logos/${slug}.png`; // Default to png for others
        }

        function renderBudgets(teams) {
            const tbody = document.querySelector('#teamTable tbody');
            tbody.innerHTML = "";
            let totalSold = 0;
            let totalSpent = 0;

            teams.forEach(t => {
                const logoUrl = getTeamLogo(t.name);
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td><img src="${logoUrl}" onerror="this.style.display='none'" class="team-logo-mini"></td>
                    <td style="font-weight:bold;">${t.name}</td>
                    <td>${t.count}</td>
                    <td style="color:var(--vpl-primary)">${t.spent} Cr</td>
                    <td style="color:var(--vcl-gold)">${t.remaining} Cr</td>
                `;
                tbody.appendChild(tr);
                totalSold += parseInt(t.count) || 0;
                totalSpent += parseFloat(t.spent) || 0;
            });

            document.getElementById('statSold').innerText = totalSold;
            document.getElementById('statSpent').innerText = totalSpent.toFixed(2) + " Cr";
        }

        let currentSquadIndex = 0;

        function renderSquads(teams) {
            const nav = document.getElementById('squadNav');
            const grid = document.getElementById('squadGrid');
            
            // Render Nav Buttons
            nav.innerHTML = "";
            teams.forEach((t, i) => {
                const btn = document.createElement('button');
                btn.className = `tab-btn ${i === currentSquadIndex ? 'active' : ''}`;
                btn.style.padding = "8px 15px";
                btn.style.fontSize = "0.75rem";
                btn.innerText = t.name;
                btn.onclick = () => {
                    currentSquadIndex = i;
                    renderSquads(teams);
                };
                nav.appendChild(btn);
            });

            // Render Selected Squad
            grid.innerHTML = "";
            const t = teams[currentSquadIndex];
            if (!t) return;

            const logoUrl = getTeamLogo(t.name);
            let squadHtml = `
                <div class="squad-card" style="max-width: 600px; margin: 0 auto;">
                    <div class="squad-header">
                        <img src="${logoUrl}" onerror="this.style.display='none'">
                        <strong style="color:var(--vpl-primary)">${t.name}</strong>
                        <span style="margin-left: auto; color: var(--vcl-gold); font-size: 0.8rem;">Budget Remaining: ${t.remaining} Cr</span>
                    </div>
                    <table class="squad-table">
                        <thead>
                            <tr style="border-bottom: 1px solid var(--border-color); color: var(--text-muted); font-size: 0.75rem;">
                                <th style="text-align:left; padding: 10px;">SL</th>
                                <th style="text-align:left; padding: 10px;">Player Name</th>
                                <th style="text-align:right; padding: 10px;">Price</th>
                            </tr>
                        </thead>
                        <tbody>`;
            
            t.players.forEach((p, i) => {
                squadHtml += `
                    <tr>
                        <td class="sl" style="padding: 10px;">${i + 1}</td>
                        <td style="padding: 10px;">${p.name}</td>
                        <td style="text-align:right; font-weight:bold; color:var(--vcl-gold); padding: 10px;">${p.price}</td>
                    </tr>`;
            });

            squadHtml += `</tbody></table></div>`;
            grid.innerHTML = squadHtml;
        }

        setInterval(fetchData, 10000); // 10s refresh
        fetchData();
    </script>
</body>
</html>
