<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wretchedly Terrible FC | Sagedian eFootball</title>
    <link rel="stylesheet" href="../assets/css/main.css">
    <style>
        .team-header {
            background: linear-gradient(135deg, var(--surface-card) 0%, var(--bg-dark) 100%);
            padding: 50px 0;
            border-bottom: 1px solid var(--border-color);
        }

        .header-flex {
            display: flex;
            align-items: center;
            gap: 30px;
        }

        .team-logo-lg {
            width: 100px;
            height: 100px;
            background: var(--surface-hover);
            border-radius: 12px;
            border: 1px solid var(--border-color);
            object-fit: contain;
        }

        .manager-card {
            background: rgba(255, 255, 255, 0.03);
            border-left: 4px solid var(--sel-primary);
            padding: 15px 20px;
            margin: 20px 0;
            border-radius: 4px;
        }

        /* Player Card Grid System */
        .player-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .player-card {
            background: var(--surface-card);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            transition: transform 0.3s ease, border-color 0.3s ease;
            position: relative;
            overflow: hidden;
        }

            .player-card:hover {
                transform: translateY(-5px);
                border-color: var(--sel-primary);
            }

            .player-card::before {
                content: "";
                position: absolute;
                top: 0;
                left: 0;
                width: 100%;
                height: 4px;
                background: var(--sel-primary);
                opacity: 0.6;
            }

        .player-name {
            font-size: 1.1rem;
            font-weight: bold;
            margin-bottom: 5px;
            display: block;
            color: var(--text-main);
        }

        .player-pos {
            font-size: 0.8rem;
            color: var(--scl-gold);
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: bold;
        }

        .position-group-title {
            margin: 40px 0 20px 0;
            font-size: 1.2rem;
            border-left: 4px solid var(--scl-gold);
            padding-left: 15px;
            color: var(--text-main);
        }
    </style>
</head>
<body>

    <div id="main-header"></div>

    <header class="team-header">
        <div class="container header-flex">
            <img src="../assets/images/logos/wretchedly-terrible-fc.png" alt="Wretchedly Terrible FC Logo" class="team-logo-lg">
            <div>
                <h1 style="font-size: 2.2rem; margin-bottom: 5px;">Wretchedly Terrible FC</h1>
                <p style="color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; font-size: 0.8rem;">Official League Member</p>
            </div>
        </div>
    </header>

    <main class="container">

        <div class="manager-card">
            <h3 style="font-size: 0.75rem; color: var(--text-muted); text-transform: uppercase;">Team Manager</h3>
            <p style="font-size: 1.2rem; font-weight: bold;">Jawadur Rafid</p>
        </div>

        <section class="squad-section">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <h2>Current Squad</h2>
            </div>

            <div class="card" style="padding: 0;">
                <table class="player-table" id="squad-table">
                    <thead>
                        <tr>
                            <th>Player Name</th>
                            <th>Position</th>
                            <th>Note</th>
                        </tr>
                    </thead>
                    <tbody id="squad-body">
                        <tr>
                            <td colspan="3" style="text-align:center; color: var(--text-muted); font-style: italic;">Loading squad...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </section>

        <script>
            const SHEET_CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTNRLcKodSD9CAu-KbkHOifpeoQ3LLNWEOE4ac5KOyuJNxQGNM83W8WPAg-N97gOfFNV9KmF3FuJAyI/pub?gid=1818817428&single=true&output=csv';

            const POSITION_ORDER = { 'GK': 1, 'DEF': 2, 'MID': 3, 'FWD': 4 };

            async function loadSquad() {
                try {
                    const res = await fetch(SHEET_CSV_URL);
                    const text = await res.text();

                    const rows = text.trim().split('\n').slice(1); // skip header row

                    const players = rows
                        .map(row => {
                            const cols = row.match(/(".*?"|[^,]+|(?<=,)(?=,)|^(?=,)|(?<=,)$)/g) || [];
                            const clean = cols.map(c => c.replace(/^"|"$/g, '').trim());
                            return {
                                name: clean[0] || '',
                                position: (clean[1] || '').toUpperCase(),
                                note: clean[2] || ''
                            };
                        })
                        .filter(p => p.name)
                        .sort((a, b) => (POSITION_ORDER[a.position] || 99) - (POSITION_ORDER[b.position] || 99));

                    const tbody = document.getElementById('squad-body');
                    tbody.innerHTML = players.map(p => `
                        <tr>
                            <td>${p.name}</td>
                            <td>${p.position}</td>
                            <td style="color: var(--text-muted); font-size: 0.85rem;">${p.note}</td>
                        </tr>
                    `).join('');

                } catch (err) {
                    document.getElementById('squad-body').innerHTML = `
                        <tr><td colspan="3" style="text-align:center; color: var(--text-muted);">Failed to load squad data.</td></tr>
                    `;
                }
            }

            loadSquad();
        </script>

        <div style="margin-top: 40px; text-align: center;">
            <a href="index.html" style="color: var(--text-muted); text-decoration: none; font-size: 0.9rem;">← Return to All Teams</a>
        </div>

    </main>

    <div id="main-footer"></div>

    <script src="../assets/js/main.js"></script>

</body>
</html>
