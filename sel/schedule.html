<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fixtures & Schedule | Sagedian eFootball</title>
    <link rel="stylesheet" href="../assets/css/main.css">
    <style>
        .schedule-header {
            margin-top: 40px;
            margin-bottom: 30px;
        }

        .matchday-nav {
            display: flex;
            gap: 10px;
            overflow-x: auto;
            padding-bottom: 10px;
            margin-bottom: 30px;
        }

        .md-btn {
            padding: 8px 16px;
            background: var(--surface-card);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            color: var(--text-muted);
            cursor: pointer;
            white-space: nowrap;
            font-size: 0.85rem;
            transition: all 0.3s;
        }

            .md-btn.active {
                background: var(--sel-primary);
                color: white;
                border-color: var(--sel-primary);
            }

        .round-section {
            display: none;
        }

            .round-section.active {
                display: block;
            }

        .match-card {
            background: var(--surface-card);
            border: 1px solid var(--border-color);
            border-radius: var(--radius);
            padding: 18px 24px;
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            align-items: center;
            gap: 16px;
            margin-bottom: 12px;
        }

        .match-home {
            text-align: right;
            font-weight: 600;
        }

        .match-away {
            text-align: left;
            font-weight: 600;
        }

        .match-score {
            text-align: center;
            font-size: 1.3rem;
            font-weight: bold;
            color: var(--sel-primary);
            min-width: 80px;
        }

            .match-score.pending {
                font-size: 0.85rem;
                color: var(--text-muted);
                font-weight: normal;
                background: var(--surface-hover);
                padding: 4px 12px;
                border-radius: 10px;
            }

        .no-matches {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-muted);
            border: 2px dashed var(--border-color);
            border-radius: var(--radius);
        }

        #loading-msg {
            text-align: center;
            padding: 60px;
            color: var(--text-muted);
        }
    </style>
</head>
<body>
    <div id="main-header"></div>
    <main class="container">
        <div class="schedule-header">
            <h1>Fixtures & Results</h1>
            <p style="color: var(--text-muted);">Sagedian eFootball League Season 07</p>
        </div>

        <div class="matchday-nav" id="round-nav"></div>
        <div id="rounds-container"><div id="loading-msg">Loading fixtures...</div></div>

        <div style="margin-top: 40px; text-align: center;">
            <a href="matchday.html" style="color: var(--text-muted); text-decoration: none; font-size: 0.9rem;">← Return to Matchday</a>
        </div>
    </main>
    <div id="main-footer"></div>
    <script src="../assets/js/main.js"></script>
    <script>

        const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTNRLcKodSD9CAu-KbkHOifpeoQ3LLNWEOE4ac5KOyuJNxQGNM83W8WPAg-N97gOfFNV9KmF3FuJAyI/pub?gid=814044146&single=true&output=csv';

        async function loadFixtures() {
            try {
                const res = await fetch(CSV_URL);
                const text = await res.text();
                const rows = text.trim().split('\n').map(r => r.split(',').map(c => c.trim()));

                // Parse into rounds
                const rounds = [];
                let currentRound = null;

                for (const row of rows) {
                    const [a, b, c] = row;

                    // Detect round header (col B contains "Round X", cols A and C empty)
                    if (!a && b && b.toLowerCase().startsWith('round') && !c) {
                        currentRound = { name: b, matches: [] };
                        rounds.push(currentRound);
                    }
                    // Detect match row (col A has home, col C has away)
                    else if (a && c && currentRound) {
                        currentRound.matches.push({ home: a, score: b || null, away: c });
                    }
                }

                renderFixtures(rounds);
            } catch (err) {
                document.getElementById('rounds-container').innerHTML =
                    `<div class="no-matches">Failed to load fixtures. Please try again later.</div>`;
            }
        }

        function renderFixtures(rounds) {
            const nav = document.getElementById('round-nav');
            const container = document.getElementById('rounds-container');
            nav.innerHTML = '';
            container.innerHTML = '';

            rounds.forEach((round, i) => {
                // Nav button
                const btn = document.createElement('button');
                btn.className = 'md-btn' + (i === 0 ? ' active' : '');
                btn.textContent = round.name;
                btn.onclick = () => switchRound(i);
                nav.appendChild(btn);

                // Round section
                const section = document.createElement('div');
                section.className = 'round-section' + (i === 0 ? ' active' : '');
                section.id = `round-${i}`;

                if (round.matches.length === 0) {
                    section.innerHTML = `<div class="no-matches">📅 No matches scheduled yet for ${round.name}.</div>`;
                } else {
                    section.innerHTML = round.matches.map(m => {
                        const scoreHtml = m.score
                            ? `<div class="match-score">${m.score}</div>`
                            : `<div class="match-score pending">vs</div>`;
                        return `
                                <div class="match-card">
                                    <div class="match-home">${m.home}</div>
                                    ${scoreHtml}
                                    <div class="match-away">${m.away}</div>
                                </div>`;
                    }).join('');
                }

                container.appendChild(section);
            });
        }

        function switchRound(index) {
            document.querySelectorAll('.md-btn').forEach((b, i) => b.classList.toggle('active', i === index));
            document.querySelectorAll('.round-section').forEach((s, i) => s.classList.toggle('active', i === index));
        }

        loadFixtures();
    </script>
</body>
</html>
