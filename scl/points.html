<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SCL Standings | Sagedian eFootball</title>
    <link rel="stylesheet" href="../assets/css/main.css">
    <style>
        .qualify-zone {
            border-left: 4px solid var(--sel-primary);
        }
    </style>
</head>
<body>

    <div id="main-header"></div>

    <main class="container" style="margin-top: 40px;">
        <h1 style="color: var(--sel-primary); margin-bottom: 5px;">SCL Standings</h1>
        <p style="color: var(--text-muted); margin-bottom: 30px;">Sagedian Champions League - Season 7</p>

        <div class="card" style="padding: 0; overflow-x: auto;">
            <table class="league-table">
                <thead>
                    <tr>
                        <th style="padding-left: 20px; width: 50px;">Pos</th>
                        <th style="width: 50px;">Logo</th>
                        <th>Team</th>
                        <th>P</th>
                        <th>W</th>
                        <th>D</th>
                        <th>L</th>
                        <th>GF</th>
                        <th>GA</th>
                        <th>GD</th>
                        <th style="padding-right: 20px;">Pts</th>
                    </tr>
                </thead>
                <tbody id="standings-body">
                    <tr>
                        <td colspan="11" style="text-align:center; padding: 40px; color: var(--text-muted); font-style: italic;">Loading standings...</td>
                    </tr>
                </tbody>
            </table>
        </div>
        <div style="margin-top: 40px; text-align: center;">
            <a href="https://sagedian-efootball.vercel.app/scl/schedule.html" style="color: var(--text-muted); text-decoration: none; font-size: 0.9rem;">← View Match Results</a>
        </div>
        <div style="margin-top: 40px; text-align: center;">
            <a href="https://sagedian-efootball.vercel.app/matchday.html" style="color: var(--text-muted); text-decoration: none; font-size: 0.9rem;">← Return to Matchday</a>
        </div>
    </main>

    <div id="main-footer"></div>

    <script src="../assets/js/main.js"></script>
    <script>
        const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTNRLcKodSD9CAu-KbkHOifpeoQ3LLNWEOE4ac5KOyuJNxQGNM83W8WPAg-N97gOfFNV9KmF3FuJAyI/pub?gid=1970867832&single=true&output=csv';

        const TEAM_META = {
            'astral warriors': { slug: 'astral-warriors', logo: 'astral-warriors.png' },
            'wretchedly terrible fc': { slug: 'wretchedly-terrible-fc', logo: 'wretchedly-terrible-fc.png' },
            'blaze dominion fc': { slug: 'blaze-dominion-fc', logo: 'blaze-dominion-fc.png' },
            'beast era': { slug: 'beast-era', logo: 'beast-era.png' },
            'spartan shield fc': { slug: 'spartan-shield-fc', logo: 'spartan-shield-fc.png' },
            'star vipers cf': { slug: 'star-vipers-cf', logo: 'star-vipers-cf.png' },
            'var team': { slug: 'var-team', logo: 'var-team.png' },
        };

        async function loadStandings() {
            try {
                const res = await fetch(CSV_URL);
                const text = await res.text();
                const rows = text.trim().split('\n').map(r => r.split(',').map(c => c.trim()));

                // Skip header row
                const teams = rows.slice(1).map(r => ({
                    name: r[0],
                    p: parseInt(r[1]) || 0,
                    w: parseInt(r[2]) || 0,
                    d: parseInt(r[3]) || 0,
                    l: parseInt(r[4]) || 0,
                    gf: parseInt(r[5]) || 0,
                    ga: parseInt(r[6]) || 0,
                    gd: parseInt(r[7]) || 0,
                    pts: parseInt(r[8]) || 0,
                })).filter(t => t.name);

                // Sort by PTS → GD → GF
                teams.sort((a, b) => b.pts - a.pts || b.gd - a.gd || b.gf - a.gf);

                const tbody = document.getElementById('standings-body');
                tbody.innerHTML = teams.map((t, i) => {
                    const meta = TEAM_META[t.name.toLowerCase()] || { slug: '#', logo: null };
                    const logoHtml = meta.logo
                        ? `<img src="../assets/images/logos/${meta.logo}" alt="" style="width:30px;height:30px;border-radius:50%;vertical-align:middle;background:var(--surface-hover);">`
                        : `<div style="width:30px;height:30px;border-radius:50%;background:var(--surface-hover);display:inline-block;"></div>`;
                    const isTop4 = i < 4;
                    const nameStyle = isTop4 ? 'font-weight:bold;' : '';
                    return `
                                <tr class="${isTop4 ? 'qualify-zone' : ''}">
                                    <td style="padding-left:20px;">${i + 1}</td>
                                    <td>${logoHtml}</td>
                                    <td><a href="../teams/${meta.slug}.html" style="color:var(--text-main);text-decoration:none;${nameStyle}">${t.name}</a></td>
                                    <td>${t.p}</td>
                                    <td>${t.w}</td>
                                    <td>${t.d}</td>
                                    <td>${t.l}</td>
                                    <td>${t.gf}</td>
                                    <td>${t.ga}</td>
                                    <td>${t.gd}</td>
                                    <td style="padding-right:20px;"><strong>${t.pts}</strong></td>
                                </tr>`;
                }).join('');

            } catch (err) {
                document.getElementById('standings-body').innerHTML =
                    `<tr><td colspan="11" style="text-align:center;padding:40px;color:var(--text-muted);">Failed to load standings.</td></tr>`;
            }
        }

        loadStandings();

        loadComponents();
    </script>

</body>
